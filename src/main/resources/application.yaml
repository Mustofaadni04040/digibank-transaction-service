spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5432/digibank_transaction_db
    username: postgres
    password: admin
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: "*"

